name: anilist-done-planned

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    # All config below is read from Secrets on Environment "prod" (Settings → Environments → prod → Environment secrets).
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run anilist_done-planned_log.py
        env:
          R2_PREFIX: Anilist
          R2_DONE_PLANNED_CSV_KEY: anilist_done-planned_log.csv
          ANILIST_USERNAME: ${{ secrets.ANILIST_USERNAME }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python anilist_done-planned_log.py
